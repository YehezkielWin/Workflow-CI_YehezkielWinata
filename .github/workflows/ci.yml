name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Ambil kode dari repositori GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Python versi stabil
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install semua dependensi pendukung
    - name: Install Dependencies
      run: |
        pip install mlflow==2.14.1 pandas==2.2.2 scikit-learn==1.5.0

    # 4. Jalankan Re-training Model
    - name: Run MLflow Project Re-training
      working-directory: ./MLProject_Folder
      env:
        MLFLOW_TRACKING_URI: "https://dagshub.com/yehezkiel.winata06/SMSML_YEHEZKIELWINATA.mlflow"
        MLFLOW_TRACKING_USERNAME: "yehezkiel.winata06"
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        mlflow run . --env-manager local

    # 5. Generate Dockerfile Menggunakan Model Lokal & Paksa Menggunakan Python 3.10 (Anti-Eror Ubuntu Paket)
    - name: Generate Docker Setup via MLflow
      run: |
        MODEL_PATH=$(find ./MLProject_Folder/mlruns/ -type d -name "baseline_model" | head -n 1)
        echo "Menggunakan model lokal dari path: $MODEL_PATH"
        # Menambahkan parameter --env-manager local agar Dockerfile menggunakan basis Python yang seragam dan modern
        mlflow models generate-dockerfile -m "$MODEL_PATH" -d ./docker_output --env-manager local

    # 6. Login ke akun Docker Hub Anda menggunakan GitHub Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 7. Build dan Push Docker Image Menggunakan GitHub Docker Builder
    - name: Build and Push Docker Image to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: ./docker_output
        push: true
        tags: yehezkielwin/credit-card-model:latest