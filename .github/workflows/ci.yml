name: Machine Learning CI Workflow

on:
  push:
    branches:
      - main

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari repositori GitHub
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Setup Lingkungan Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install Dependensi Utama
    - name: Install MLflow & DagsHub
      run: |
        pip install mlflow dagshub pandas scikit-learn

    # 4. Jalankan Re-training Model via MLProject
    # Kita berikan ID step "training_step" untuk menangkap output log jika diperlukan
    - name: Run MLflow Project Re-training
      id: training_step
      env:
        DAGSHUB_USERNAME: "yehezkiel.winata06"
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        mlflow run MLProject_Folder --no-conda

    # 5. Build Docker Image Menggunakan Fungsi Bawaan MLflow (Syarat Advance)
    # Menggunakan opsi lokal model generator agar tidak bergantung pada ID Run eksternal di cloud saat build
    - name: Build Docker Image via MLflow
      run: |
        mlflow models build-docker -m "MLProject_Folder/tuned_rf_model" -n "yehezkielwin/credit-card-model:latest" --enable-mlflow-deployment

    # 6. Login ke Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 7. Push Docker Image ke Docker Hub Resmi (Syarat Advance)
    - name: Push Docker Image to Docker Hub
      run: |
        docker push yehezkielwin/credit-card-model:latest